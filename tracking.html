<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIP Logistics | Logistics</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page-elegant" style="opacity:0;">
    <script>
        function checkTRIPAuth() {
            const username = sessionStorage.getItem('active_session');
            if (!username) {
                window.location.replace('index.html');
                return null;
            }
            requestAnimationFrame(() => { document.body.style.opacity = '1'; });
            return username;
        }

        async function signOut() {
            try { await userLogout(); } catch {}
            sessionStorage.removeItem('active_session');
            window.location.href = 'index.html';
        }

        const activeUser = checkTRIPAuth();
    </script>

    <nav class="trip-nav">
        <a href="flight.html" class="trip-brand">
            <img class="trip-logo" src="logo.png" alt="TRIP Logistics">
            <span>TRIP Logistics</span>
        </a>
        <div class="trip-nav-right">
            <span id="sessionPill" class="badge-pill session-pill" style="color:var(--warning); border-color:var(--warning); background: rgba(245,158,11,0.10);">SESSION</span>
            <button class="nav-signout theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme"></button>
            <button class="nav-toggle" id="navToggle" type="button" aria-label="Menu" aria-expanded="false">☰</button>
            <div class="trip-links" id="navMenu">
                <a href="flight.html">Status</a>
                <a href="passengers.html">Personnel</a>
                <a href="tracking.html" class="active">Logistics</a>
                <a href="ledger.html">Ledger</a>
                <a href="bookings.html">Bookings</a>
                <button class="nav-signout" id="signOutBtn" type="button">Sign Out</button>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 980px;">
        <h2 style="letter-spacing:-1px; margin-bottom: 14px;">Movement Tracker</h2>
        <div style="color:var(--text-dim); font-weight:700; margin-bottom: 18px;">Active, passed, and future logistics steps are scoped to the active TRIP session.</div>

        <div class="admin-row">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:12px;">
                    <div style="font-weight:900; letter-spacing:-0.6px;">Active Step</div>
                    <div style="color:var(--text-dim); font-weight:800; font-size:0.8rem;">Live</div>
                </div>
                <div class="track-line" id="activeBox"></div>
            </div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:12px;">
                    <div style="font-weight:900; letter-spacing:-0.6px;">Passed Steps</div>
                    <div style="color:var(--text-dim); font-weight:800; font-size:0.8rem;">History</div>
                </div>
                <div class="track-line" id="passedBox"></div>
            </div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:12px;">
                <div style="font-weight:900; letter-spacing:-0.6px;">Future Steps</div>
                <div style="color:var(--text-dim); font-weight:800; font-size:0.8rem;">Upcoming</div>
            </div>
            <div class="track-line" id="futureBox"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    <script src="appwrite.js"></script>
    <script>
        function renderStepCard(stepIdx, current, s) {
            return `<div class="step ${stepIdx === current ? 'active' : ''} ${stepIdx > current ? 'future' : ''}">
                <div style="display:flex; justify-content:space-between; gap:12px; align-items:baseline;">
                    <div style="font-size:0.65rem; color:var(--accent); font-weight:900; letter-spacing:1px; text-transform:uppercase;">Step ${stepIdx}</div>
                    <div style="font-size:0.75rem; color:var(--text-dim); font-weight:800;">${s.date || '—'}</div>
                </div>
                <div style="font-weight:900; font-size:1.05rem; letter-spacing:-0.4px; margin-top:8px;">${s.title || '—'}</div>
                <div style="font-size:0.85rem; color:var(--text-dim); font-weight:700; margin-top:4px;">${s.location || '—'}</div>
            </div>`;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!activeUser) return;
            initThemeToggle();

            const toggle = document.getElementById('navToggle');
            const menu = document.getElementById('navMenu');
            toggle.addEventListener('click', () => {
                const next = !menu.classList.contains('open');
                menu.classList.toggle('open', next);
                toggle.setAttribute('aria-expanded', String(next));
            });
            document.getElementById('signOutBtn').addEventListener('click', signOut);
            const sessionPill = document.getElementById('sessionPill');
            const setPill = (label, type) => {
                if (!sessionPill) return;
                sessionPill.textContent = label;
                let color = 'var(--warning)';
                let bg = 'rgba(245,158,11,0.10)';
                if (type === 'ok') { color = 'var(--success)'; bg = 'rgba(16,185,129,0.10)'; }
                if (type === 'bad') { color = 'var(--danger)'; bg = 'rgba(239,68,68,0.10)'; }
                sessionPill.style.color = color;
                sessionPill.style.borderColor = color;
                sessionPill.style.background = bg;
            };

            const pack = await loadActiveUserFromDB();
            const user = pack && pack.userData ? pack.userData : null;
            if (!user) {
                setPill('SESSION EXPIRED', 'bad');
                signOut();
                return;
            }
            setPill('SERVER ACTIVE', 'ok');

            const logistics = user.logistics || { currentStep: 2, steps: [] };
            const current = parseInt(String(logistics.currentStep || 2), 10) || 2;
            const steps = Array.isArray(logistics.steps) && logistics.steps.length === 5
                ? logistics.steps
                : [
                    { title: "Booking Confirmed", location: "London HQ", date: "System Log" },
                    { title: "Security Clearance", location: "TRIP Gateway", date: "Pending" },
                    { title: "Departure Protocol", location: "Terminal Gateway", date: "Scheduled" },
                    { title: "International Transit", location: "Airborne", date: "Scheduled" },
                    { title: "Arrival (ICN)", location: "Incheon, KR", date: "Scheduled" }
                ];

            const activeBox = document.getElementById('activeBox');
            const passedBox = document.getElementById('passedBox');
            const futureBox = document.getElementById('futureBox');
            activeBox.innerHTML = '';
            passedBox.innerHTML = '';
            futureBox.innerHTML = '';

            steps.forEach((s, i) => {
                const stepIdx = i + 1;
                if (stepIdx < current) passedBox.innerHTML += renderStepCard(stepIdx, current, s);
                if (stepIdx === current) activeBox.innerHTML += renderStepCard(stepIdx, current, s);
                if (stepIdx > current) futureBox.innerHTML += renderStepCard(stepIdx, current, s);
            });

            if (!activeBox.innerHTML) {
                activeBox.innerHTML = `<div style="color:var(--text-dim); font-weight:800;">No active step set.</div>`;
            }
            if (!passedBox.innerHTML) {
                passedBox.innerHTML = `<div style="color:var(--text-dim); font-weight:800;">No passed steps yet.</div>`;
            }
            if (!futureBox.innerHTML) {
                futureBox.innerHTML = `<div style="color:var(--text-dim); font-weight:800;">No future steps queued.</div>`;
            }
        });
    </script>
</body>
</html>
