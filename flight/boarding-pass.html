<!DOCTYPE html>
<html lang="en" data-default-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIP Airways | Boarding Pass</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="page-elegant" style="opacity:0;">
    <nav class="trip-nav">
        <a href="/index.html" class="trip-brand">
            <img class="trip-logo" src="/logo.png" alt="TRIP Airways">
            <span>TRIP Airways</span>
        </a>
        <div class="trip-nav-right">
            <span class="badge-pill session-pill" style="color:var(--accent); border-color:var(--accent); background: rgba(225,29,72,0.10);">SHARED</span>
        </div>
    </nav>

    <div class="container" style="max-width: 980px;">
        <div class="ticket-8k ticket-surface boarding-pass" id="bpCard" style="display:none;">
            <div class="ticket-8k__main">
                <div class="ticket-8k__top">
                    <div>
                        <div class="ticket-8k__brandline">TRIP Airways</div>
                        <div class="ticket-8k__sub">BOARDING PASS • SHARED VIEW</div>
                    </div>
                    <div style="text-align:right;">
                        <span id="stBadge" class="badge-pill" style="color:var(--warning); border-color:var(--warning); background: rgba(245,158,11,0.10);">PENDING</span>
                        <div style="margin-top:10px; color:var(--ticket-dim); font-weight:800; font-size:0.75rem; letter-spacing:1px; text-transform:uppercase;">Official Manifest</div>
                    </div>
                </div>

                <div class="ticket-8k__route">
                    <div class="route-side">
                        <div class="route-label">Departure</div>
                        <div class="route-code dep" id="codeDep">LHR</div>
                    </div>
                    <div class="route-mid">
                        <div class="route-line"></div>
                        <div class="route-txt" id="routeTxt">LHR-ICN</div>
                    </div>
                    <div class="route-side" style="text-align:right;">
                        <div class="route-label">Arrival</div>
                        <div class="route-code arr" id="codeArr">ICN</div>
                    </div>
                </div>

                <div class="ticket-8k__grid">
                    <div>
                        <div class="ticket-k">Passenger</div>
                        <div class="ticket-passenger" id="dispName">—</div>
                    </div>
                    <div class="ticket-grid-mini">
                        <div>
                            <div class="ticket-k">Gate</div>
                            <div class="ticket-v" id="dispGate">—</div>
                        </div>
                        <div>
                            <div class="ticket-k">Seat</div>
                            <div class="ticket-v" id="dispSeat">—</div>
                        </div>
                        <div>
                            <div class="ticket-k">Class</div>
                            <div class="ticket-v" id="dispCls">—</div>
                        </div>
                        <div>
                            <div class="ticket-k">Terminal</div>
                            <div class="ticket-v" id="dispTerminal">—</div>
                        </div>
                    </div>
                </div>

                <div class="ticket-grid-mini" style="margin-top:12px;">
                    <div><div class="ticket-k">Flight</div><div class="ticket-v" id="dispFlightNo">—</div></div>
                    <div><div class="ticket-k">PNR</div><div class="ticket-v" id="dispPnr">—</div></div>
                    <div><div class="ticket-k">Board</div><div class="ticket-v" id="dispBoardAt">—</div></div>
                    <div><div class="ticket-k">Group</div><div class="ticket-v" id="dispGroup">—</div></div>
                </div>

                <div class="ticket-grid-mini" style="margin-top:12px; grid-template-columns: 1fr;">
                    <div>
                        <div class="ticket-k">Signature</div>
                        <div style="display:flex; justify-content:space-between; align-items:flex-end; gap:12px; flex-wrap:wrap; margin-top:6px;">
                            <div class="ticket-v" id="sigNameTxt">—</div>
                            <img id="sigImg" alt="Signature" style="width:200px; height:56px; object-fit:contain; border-bottom:1px solid var(--border); display:none;">
                        </div>
                    </div>
                </div>
            </div>
            <div class="ticket-8k__stub">
                <div class="stub-meta">
                    <div>
                        <div class="ticket-k">Tracking Code</div>
                        <div class="stub-id" id="trackingCode">—</div>
                    </div>
                    <div>
                        <div class="ticket-k">Status</div>
                        <div class="stub-id" id="dispStatus">—</div>
                    </div>
                    <div>
                        <div class="ticket-k">PDF</div>
                        <button class="btn-secondary" type="button" id="btnPdf" style="margin-top:10px; width:100%;">Download</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" id="errCard" style="display:none;">
            <div style="font-weight:900; color:var(--danger);">Access denied</div>
            <div id="errMsg" style="margin-top:10px; color:var(--text-dim); font-weight:800;"></div>
        </div>
    </div>

    <script src="/appwrite.js"></script>
    <script>
        function q(k) {
            return new URLSearchParams(window.location.search).get(k) || '';
        }

        function setStatusBadge(status) {
            const st = String(status || 'PENDING').toUpperCase();
            document.getElementById('dispStatus').textContent = st;
            const badge = document.getElementById('stBadge');
            const map = {
                CONFIRMED: 'var(--success)',
                VERIFIED: 'var(--success)',
                CANCELLED: 'var(--danger)',
                DECLINED: 'var(--danger)',
                REJECTED: 'var(--danger)',
                SUSPENDED: 'var(--warning)',
                VERIFYING: 'var(--warning)',
                PENDING: 'var(--warning)',
                'ON-HOLD': 'var(--warning)'
            };
            const c = map[st] || 'var(--warning)';
            badge.textContent = st;
            badge.style.color = c;
            badge.style.borderColor = c;
            badge.style.background = c === 'var(--success)' ? 'rgba(16,185,129,0.10)' : (c === 'var(--danger)' ? 'rgba(239,68,68,0.10)' : 'rgba(245,158,11,0.10)');
        }

        function pickSignature(user) {
            const f = user && user.form && typeof user.form === 'object' ? user.form : null;
            if (f && f.signature && f.signature.dataUrl) return f.signature;
            const subs = user && user.submissions && typeof user.submissions === 'object' ? user.submissions : null;
            const arr = subs && Array.isArray(subs.indemnity) ? subs.indemnity : [];
            if (arr[0] && arr[0].signature && arr[0].signature.dataUrl) return arr[0].signature;
            return null;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const u = q('u');
            const tc = q('tc');
            const key = q('k');
            const bp = document.getElementById('bpCard');
            const errCard = document.getElementById('errCard');
            const errMsg = document.getElementById('errMsg');

            try {
                const out = key ? await publicBoardingPass(u, key) : await publicDetails(u, tc);
                const user = out && out.userData ? out.userData : null;
                const username = out && out.username ? out.username : u;
                if (!user) throw new Error('No user data');
                const f = user.flight || {};
                const r = f.route || {};
                const b = f.boarding || {};
                const m = user.manifest || {};

                const from = r.from || m.from || 'LHR';
                const to = r.to || m.to || 'ICN';
                document.getElementById('codeDep').textContent = from;
                document.getElementById('codeArr').textContent = to;
                document.getElementById('routeTxt').textContent = `${from}-${to}`;
                document.getElementById('dispGate').textContent = b.gate || m.gate || '--';
                document.getElementById('dispSeat').textContent = b.seat || m.seat || '--';
                document.getElementById('dispCls').textContent = String(b.cabin || m.flightClass || 'Business').toUpperCase();
                document.getElementById('dispTerminal').textContent = b.terminal || '--';
                document.getElementById('dispName').textContent = user.passengerName || username;
                document.getElementById('dispFlightNo').textContent = (f.schedule && f.schedule.flightNo) ? f.schedule.flightNo : (m.flightNo || `${from}-${to}`);
                document.getElementById('dispPnr').textContent = (f.schedule && f.schedule.pnr) ? f.schedule.pnr : '—';
                document.getElementById('dispBoardAt').textContent = (f.schedule && f.schedule.boardAt) ? f.schedule.boardAt : '—';
                document.getElementById('dispGroup').textContent = (b && b.group) ? b.group : '—';
                setStatusBadge(f.status || m.status || 'PENDING');
                document.getElementById('trackingCode').textContent = key || tc || '—';

                const sig = pickSignature(user);
                const sigNameTxt = document.getElementById('sigNameTxt');
                const sigImg = document.getElementById('sigImg');
                if (sig && sig.dataUrl) {
                    if (sigNameTxt) sigNameTxt.textContent = sig.name ? String(sig.name) : '—';
                    if (sigImg) {
                        sigImg.src = sig.dataUrl;
                        sigImg.style.display = 'block';
                    }
                } else {
                    if (sigNameTxt) sigNameTxt.textContent = '—';
                    if (sigImg) sigImg.style.display = 'none';
                }

                bp.style.display = 'grid';
            } catch (e) {
                errCard.style.display = 'block';
                errMsg.textContent = 'Invalid or used code.';
            }

            const btnPdf = document.getElementById('btnPdf');
            if (btnPdf) btnPdf.addEventListener('click', () => window.print());

            requestAnimationFrame(() => { document.body.style.opacity = '1'; });
        });
    </script>
</body>
</html>
