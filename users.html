<!DOCTYPE html>
<html lang="en" data-force-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>TRIP Admin | User Management</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧑‍💼</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --admin-sidebar-width: 280px;
            --admin-header-height: 70px;
            --admin-bg: #f8fafc;
            --admin-card-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --admin-bg: #0f172a;
            --admin-card-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        body {
            background: var(--admin-bg);
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Sidebar Styles */
        .admin-layout {
            display: flex;
            width: 100%;
        }

        .sidebar {
            width: var(--admin-sidebar-width);
            background: var(--card);
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .nav-item:hover {
            background: var(--input-bg);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--accent-light, rgba(30, 64, 175, 0.1));
            color: var(--accent, #1e40af);
        }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            margin-left: var(--admin-sidebar-width);
            padding: 24px;
            max-width: calc(100vw - var(--admin-sidebar-width));
        }

        .header {
            height: var(--admin-header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.75rem;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        /* Stats Row */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--admin-card-shadow);
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
        }

        /* User Table/Grid Container */
        .content-card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--admin-card-shadow);
            overflow: hidden;
        }

        .table-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .search-wrap {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            font-weight: 600;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }

        /* Modern Table Styles */
        .user-table {
            width: 100%;
            border-collapse: collapse;
        }

        .user-table th {
            text-align: left;
            padding: 16px 24px;
            background: var(--input-bg);
            color: var(--text-dim);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .user-table td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }

        .user-table tr:last-child td {
            border-bottom: none;
        }

        .user-table tr:hover {
            background: var(--input-bg);
        }

        .user-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 800;
        }

        .status-confirmed { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .status-suspended { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--accent-light, #e0e7ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--accent, #1e40af);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-card {
            background: var(--card);
            width: min(800px, 95vw);
            max-height: 90vh;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .modal-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }

        .btn-mini {
            padding: 6px 12px;
            font-size: 0.75rem;
            border-radius: 8px;
        }

        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; padding: 16px; max-width: 100vw; }
            .modal-body { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img class="trip-logo" src="logo.png" alt="TRIP" style="height:32px;">
                <div style="font-weight:900; letter-spacing:-0.5px;">TRIP Admin</div>
            </div>
            <nav class="sidebar-nav">
                <a href="management.html" class="nav-item">
                    <span>📊</span> Management
                </a>
                <a href="users.html" class="nav-item active">
                    <span>👥</span> User Directory
                </a>
                <a href="flight.html" class="nav-item">
                    <span>✈️</span> Flight Portal
                </a>
                <a href="tracking.html" class="nav-item">
                    <span>🚚</span> Logistics
                </a>
                <div style="margin-top:auto; padding-top:20px; border-top:1px solid var(--border);">
                    <button id="btnSignOut" class="nav-item" style="width:100%; background:none; border:none; cursor:pointer;">
                        <span>🚪</span> Sign Out
                    </button>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-title">
                    <div style="color:var(--text-dim); font-size:0.875rem; font-weight:700;">Admin Dashboard</div>
                    <h1>User Management</h1>
                </div>
                <div class="header-actions">
                    <button class="btn-secondary" id="adminThemeToggle">🌙</button>
                    <button class="btn-primary" id="btnOpenCreateModal">+ Create New User</button>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Registered Users</div>
                    <div class="stat-value" id="statTotalUsers">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Active Flight Users</div>
                    <div class="stat-value" id="statFlightUsers">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Active Logistics Users</div>
                    <div class="stat-value" id="statLogisticsUsers">0</div>
                </div>
            </div>

            <div class="content-card">
                <div class="table-header">
                    <div class="search-wrap">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="userSearch" class="search-input" placeholder="Search by name, username, or pin...">
                    </div>
                    <div class="header-actions">
                        <select id="filterService" class="search-input" style="padding-left:16px; width:auto;">
                            <option value="">All Services</option>
                            <option value="FLIGHT">Flight</option>
                            <option value="LOGISTICS">Logistics</option>
                        </select>
                        <button class="btn-secondary" id="btnRefresh">Refresh</button>
                    </div>
                </div>
                <div style="overflow-x:auto;">
                    <table class="user-table">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Credentials</th>
                                <th>Service</th>
                                <th>Status</th>
                                <th>Balance</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <!-- Users will be injected here -->
                        </tbody>
                    </table>
                </div>
                <div id="tableLoader" style="padding:40px; text-align:center; font-weight:800; color:var(--text-dim);">
                    Loading users...
                </div>
            </div>
        </main>
    </div>

    <!-- Create/Edit User Modal -->
    <div class="modal-overlay" id="userModal">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modalTitle" style="margin:0; letter-spacing:-0.5px;">Create New User</h2>
                <button class="btn-secondary btn-mini" id="btnCloseModal">✕</button>
            </div>
            <form id="userForm">
                <div class="modal-body">
                    <input type="hidden" id="editOriginalUsername">
                    <div class="form-group">
                        <label class="form-label">Passenger Name</label>
                        <input type="text" id="formName" placeholder="Full Name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="formUsername" placeholder="Trip_user####" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Access PIN</label>
                        <input type="text" id="formPin" placeholder="6-8 digits" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Service Category</label>
                        <select id="formService">
                            <option value="FLIGHT">Flight Portal</option>
                            <option value="LOGISTICS">Logistics Tracker</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Initial Balance</label>
                        <div style="display:flex; gap:8px;">
                            <input type="text" id="formBalance" placeholder="0.00" value="186.00">
                            <select id="formCurrency" style="width:80px;">
                                <option value="£">£</option>
                                <option value="$">$</option>
                                <option value="€">€</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Initial Status</label>
                        <select id="formStatus">
                            <option value="PENDING">PENDING</option>
                            <option value="CONFIRMED">CONFIRMED</option>
                            <option value="ON-HOLD">ON-HOLD</option>
                            <option value="VERIFYING">VERIFYING</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label class="form-label">Internal Notes</label>
                        <textarea id="formNotes" rows="3" placeholder="Private notes for admin..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="btnCancelForm">Cancel</button>
                    <button type="submit" class="btn-primary" id="btnSaveUser">Save User Profile</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    <script src="appwrite.js"></script>
    <script>
        let allUsers = [];
        const modal = document.getElementById('userModal');
        const userForm = document.getElementById('userForm');

        // Initialize Admin Session
        async function checkAuth() {
            try {
                const out = await adminMe();
                if (!out || !out.ok) {
                    window.location.replace('/management.html');
                }
            } catch {
                window.location.replace('/management.html');
            }
        }

        // Fetch Users with Fallback
        async function loadUsers() {
            const tableBody = document.getElementById('userTableBody');
            const loader = document.getElementById('tableLoader');
            
            tableBody.innerHTML = '';
            loader.style.display = 'block';
            loader.textContent = 'Fetching user registry...';

            try {
                const response = await tripApi('/api/admin/users', { method: 'GET' });
                let usersMap = {};
                if (response && response.users) {
                    usersMap = response.users;
                } else {
                    throw new Error('API returned no users');
                }
                
                allUsers = Object.keys(usersMap).map(u => ({
                    username: u,
                    ...usersMap[u]
                }));
            } catch (e) {
                console.warn('Appwrite fetch failed, trying local JSON fallback:', e);
                try {
                    const res = await fetch('/api/users.json');
                    if (res.ok) {
                        allUsers = await res.json();
                    }
                } catch (err) {
                    console.error('Fallback failed:', err);
                }
            }

            renderUsers();
            updateStats();
            loader.style.display = 'none';
        }

        function renderUsers() {
            const tableBody = document.getElementById('userTableBody');
            const searchTerm = document.getElementById('userSearch').value.toLowerCase();
            const serviceFilter = document.getElementById('filterService').value;

            const filtered = allUsers.filter(u => {
                const matchesSearch = 
                    u.username.toLowerCase().includes(searchTerm) || 
                    (u.passengerName || '').toLowerCase().includes(searchTerm) ||
                    (u.pin || '').includes(searchTerm);
                
                const matchesService = !serviceFilter || (u.serviceCategory || u.service_category || 'FLIGHT').toUpperCase() === serviceFilter;
                
                return matchesSearch && matchesService;
            });

            tableBody.innerHTML = filtered.map(u => {
                const status = (u.manifest && u.manifest.status) || 'PENDING';
                const statusClass = `status-${status.toLowerCase()}`;
                const service = (u.serviceCategory || u.service_category || 'FLIGHT').toUpperCase();
                const balance = (u.ledger && u.ledger.balance) || '0.00';
                const currency = (u.ledger && u.ledger.currency) || '£';
                
                return `
                    <tr>
                        <td>
                            <div style="display:flex; align-items:center; gap:12px;">
                                <div class="avatar">${(u.passengerName || u.username).charAt(0).toUpperCase()}</div>
                                <div>
                                    <div style="font-weight:800;">${u.passengerName || 'N/A'}</div>
                                    <div style="font-size:0.75rem; color:var(--text-dim);">@${u.username}</div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div style="font-family:monospace; font-weight:800; letter-spacing:1px;">${u.pin}</div>
                        </td>
                        <td>
                            <div style="font-weight:800; font-size:0.75rem; color:var(--text-dim);">${service}</div>
                        </td>
                        <td>
                            <span class="user-badge ${statusClass}">${status}</span>
                        </td>
                        <td>
                            <div style="font-weight:800;">${currency}${balance}</div>
                        </td>
                        <td>
                            <div style="display:flex; gap:8px;">
                                <button class="btn-secondary btn-mini" onclick="editUser('${u.username}')">Edit</button>
                                <button class="btn-secondary btn-mini" style="color:var(--danger); border-color:rgba(239,68,68,0.2);" onclick="deleteUserPrompt('${u.username}')">Delete</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            if (filtered.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px; color:var(--text-dim); font-weight:800;">No users found matching your criteria.</td></tr>`;
            }
        }

        function updateStats() {
            document.getElementById('statTotalUsers').textContent = allUsers.length;
            document.getElementById('statFlightUsers').textContent = allUsers.filter(u => (u.serviceCategory || u.service_category || 'FLIGHT').toUpperCase() === 'FLIGHT').length;
            document.getElementById('statLogisticsUsers').textContent = allUsers.filter(u => (u.serviceCategory || u.service_category || 'FLIGHT').toUpperCase() === 'LOGISTICS').length;
        }

        // CRUD Operations
        async function saveUser(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSaveUser');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            const originalUsername = document.getElementById('editOriginalUsername').value;
            const username = document.getElementById('formUsername').value.trim();
            const userData = {
                username: username,
                passengerName: document.getElementById('formName').value.trim(),
                pin: document.getElementById('formPin').value.trim(),
                serviceCategory: document.getElementById('formService').value,
                ledger: {
                    balance: document.getElementById('formBalance').value || '0.00',
                    currency: document.getElementById('formCurrency').value,
                    transactions: []
                },
                manifest: {
                    status: document.getElementById('formStatus').value,
                    from: "LHR",
                    to: "ICN",
                    gate: "--",
                    seat: "--",
                    flightClass: "Business"
                },
                profile: {
                    notes: document.getElementById('formNotes').value
                }
            };

            try {
                // If editing and username changed, delete old one first (Appwrite limitation on $id change)
                if (originalUsername && originalUsername !== username) {
                    await tripApi(`/api/admin/users/${encodeURIComponent(originalUsername)}`, { method: 'DELETE' });
                }

                await tripApi('/api/admin/users', {
                    method: 'POST',
                    body: { username, userData }
                });

                toast('User profile saved successfully!', 'ok');
                closeModal();
                loadUsers();
            } catch (err) {
                toast(err.payload?.error || 'Failed to save user.', 'bad');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save User Profile';
            }
        }

        async function deleteUserPrompt(username) {
            if (confirm(`Are you sure you want to permanently delete user @${username}?`)) {
                try {
                    await tripApi(`/api/admin/users/${encodeURIComponent(username)}`, { method: 'DELETE' });
                    toast(`User @${username} deleted.`, 'ok');
                    loadUsers();
                } catch (err) {
                    toast('Delete failed.', 'bad');
                }
            }
        }

        function editUser(username) {
            const u = allUsers.find(x => x.username === username);
            if (!u) return;

            document.getElementById('modalTitle').textContent = `Edit User: @${username}`;
            document.getElementById('editOriginalUsername').value = username;
            document.getElementById('formUsername').value = username;
            document.getElementById('formName').value = u.passengerName || '';
            document.getElementById('formPin').value = u.pin || '';
            document.getElementById('formService').value = (u.serviceCategory || u.service_category || 'FLIGHT').toUpperCase();
            document.getElementById('formBalance').value = (u.ledger && u.ledger.balance) || '0.00';
            document.getElementById('formCurrency').value = (u.ledger && u.ledger.currency) || '£';
            document.getElementById('formStatus').value = (u.manifest && u.manifest.status) || 'PENDING';
            document.getElementById('formNotes').value = (u.profile && u.profile.notes) || '';

            modal.style.display = 'flex';
        }

        function openCreateModal() {
            userForm.reset();
            document.getElementById('modalTitle').textContent = 'Create New User';
            document.getElementById('editOriginalUsername').value = '';
            document.getElementById('formUsername').value = 'Trip_user' + Math.floor(1000 + Math.random() * 9000);
            document.getElementById('formPin').value = Math.floor(100000 + Math.random() * 900000);
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        function toast(msg, type) {
            const div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.bottom = '24px';
            div.style.right = '24px';
            div.style.padding = '16px 24px';
            div.style.borderRadius = '12px';
            div.style.background = type === 'ok' ? '#10b981' : '#ef4444';
            div.style.color = 'white';
            div.style.fontWeight = '800';
            div.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.1)';
            div.style.zIndex = '9999';
            div.style.animation = 'slideIn 0.3s ease-out';
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        // Event Listeners
        document.getElementById('btnOpenCreateModal').addEventListener('click', openCreateModal);
        document.getElementById('btnCloseModal').addEventListener('click', closeModal);
        document.getElementById('btnCancelForm').addEventListener('click', closeModal);
        document.getElementById('userForm').addEventListener('submit', saveUser);
        document.getElementById('userSearch').addEventListener('input', renderUsers);
        document.getElementById('filterService').addEventListener('change', renderUsers);
        document.getElementById('btnRefresh').addEventListener('click', loadUsers);
        document.getElementById('btnSignOut').addEventListener('click', async () => {
            await adminLogout();
            window.location.replace('/management.html');
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            initThemeToggle('adminThemeToggle');
            await checkAuth();
            loadUsers();
        });
    </script>
</body>
</html>
