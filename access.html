<!DOCTYPE html>
<html lang="en" data-default-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIP | Access Portal</title>
    <link rel="stylesheet" href="/assets/css/app.css">
    <script>
        window.TRIP_API_BASE = 'https://hybe-portal.vercel.app';
        try { localStorage.setItem('trip_api_base', window.TRIP_API_BASE); } catch {}
    </script>
    <style>
        .portal-shell{
            min-height: 100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding: 26px 14px;
        }
        .portal-card{
            width: min(980px, 100%);
            padding: 20px;
        }
        .portal-grid{
            margin-top: 14px;
            display:grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 900px){
            .portal-grid{ grid-template-columns: 1fr; }
        }
        .portal-btn{
            width:100%;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap: 14px;
            padding: 16px 16px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            text-align:left;
        }
        .portal-btn:hover{
            border-color: rgba(225,29,72,0.35);
            box-shadow: 0 16px 50px rgba(0,0,0,0.08);
        }
        .portal-title{
            font-weight: 1000;
            font-size: 1.05rem;
            letter-spacing: -0.4px;
        }
        .portal-sub{
            margin-top: 6px;
            color: var(--text-dim);
            font-weight: 800;
            line-height: 1.35;
            font-size: 0.9rem;
        }
        .portal-icon{
            width: 44px;
            height: 44px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(225,29,72,0.10);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size: 22px;
            flex: 0 0 auto;
        }
    </style>
</head>
<body class="page-elegant">
    <div class="portal-shell">
        <div class="card portal-card">
            <div style="display:flex; align-items:center; gap:12px; justify-content:space-between; flex-wrap:wrap;">
                <div style="display:flex; align-items:center; gap:12px;">
                    <img class="trip-logo" src="/logo.png" alt="TRIP" style="width:42px; height:42px;">
                    <div>
                        <div style="font-weight:1000; font-size:1.25rem; letter-spacing:-0.7px;">TRIP Access Portal</div>
                        <div style="color:var(--text-dim); font-weight:800; margin-top:3px;">Choose your service to continue</div>
                    </div>
                </div>
            </div>

            <div style="margin-top:14px;">
                <div style="font-weight:900; font-size:0.7rem; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim); margin:0 0 8px;">Username</div>
                <input id="portalUsername" type="text" placeholder="Trip_user####" autocomplete="username" style="margin:0;" readonly>
                <div style="margin-top:8px; color:var(--text-dim); font-weight:800; font-size:0.85rem;">Your Username is provided by Admin provisioning.</div>
            </div>

            <div id="portalMsg" style="margin-top:12px; color:var(--text-dim); font-weight:800; min-height:22px;"></div>

            <div class="portal-grid" id="portalGrid">
                <button class="portal-btn" type="button" id="btnFlights">
                    <div style="display:flex; align-items:center; gap:14px;">
                        <div class="portal-icon" aria-hidden="true">✈️</div>
                        <div>
                            <div class="portal-title">Flights</div>
                            <div class="portal-sub">Passenger dashboard, boarding pass, e-ticket, and flight status.</div>
                        </div>
                    </div>
                    <div style="color:var(--text-dim); font-weight:1000;">→</div>
                </button>

                <button class="portal-btn" type="button" id="btnCourier">
                    <div style="display:flex; align-items:center; gap:14px;">
                        <div class="portal-icon" aria-hidden="true" style="background:rgba(16,185,129,0.10);">🚚</div>
                        <div>
                            <div class="portal-title">Courier</div>
                            <div class="portal-sub">Tracking, waybill, submissions, and delivery operations.</div>
                        </div>
                    </div>
                    <div style="color:var(--text-dim); font-weight:1000;">→</div>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    <script src="/assets/js/appwrite.js"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        function qs(name) {
            const p = new URLSearchParams(window.location.search);
            return p.get(name);
        }
        function setSystem(sys) {
            const s = String(sys || '').toLowerCase();
            const v = s === 'logistics' ? 'logistics' : 'flights';
            sessionStorage.setItem('system', v);
            return v;
        }
        function toLoginUrl(sys) {
            const u = (document.getElementById('portalUsername') && document.getElementById('portalUsername').value)
                ? String(document.getElementById('portalUsername').value || '').trim()
                : String(qs('u') || '').trim();
            const base = sys === 'logistics' ? '/auth/courier.html' : '/auth/flight.html';
            if (!u) return base;
            const url = new URL(base, window.location.origin);
            url.searchParams.set('u', u);
            return url.pathname + url.search;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const msg = document.getElementById('portalMsg');
            const uInput = document.getElementById('portalUsername');

            try {
                if (typeof userMe === 'function') {
                    const me = await userMe().catch(() => null);
                    if (me && me.userData) {
                        const cat = serviceCategoryOf(me.userData);
                        const sys = cat === 'LOGISTICS' ? 'logistics' : 'flights';
                        setSystem(sys);
                        window.location.replace(sys === 'logistics' ? '/logistics/dashboard/index.html' : '/flights/dashboard/index.html');
                        return;
                    }
                }
            } catch {}

            try {
                const uQ = String(qs('u') || '').trim();
                const uS = String(sessionStorage.getItem('active_session') || '').trim();
                const u = uQ || uS;
                if (uInput && u) uInput.value = u;
            } catch {}

            const sysParam = String(qs('sys') || '').toLowerCase();
            const sysStored = String(sessionStorage.getItem('system') || '').toLowerCase();
            const sys = sysParam === 'logistics' || sysParam === 'courier' ? 'logistics' : (sysParam === 'flights' ? 'flights' : (sysStored === 'logistics' || sysStored === 'flights' ? sysStored : ''));

            const grid = document.getElementById('portalGrid');
            const flights = document.getElementById('btnFlights');
            const courier = document.getElementById('btnCourier');

            function go(sysNext) {
                const u = uInput ? String(uInput.value || '').trim() : '';
                if (!u) {
                    if (msg) msg.textContent = 'Enter your Username to continue.';
                    try { uInput && uInput.focus(); } catch {}
                    return;
                }
                const v = setSystem(sysNext);
                window.location.href = toLoginUrl(v);
            }

            flights.addEventListener('click', () => go('flights'));
            courier.addEventListener('click', () => go('logistics'));

            if (sys) {
                if (sys === 'logistics') flights.style.display = 'none';
                if (sys === 'flights') courier.style.display = 'none';
                if (msg) msg.textContent = `Continue to ${sys === 'logistics' ? 'Courier' : 'Flights'}.`;
            } else {
                if (msg) msg.textContent = 'Select your service to continue.';
            }
        });
    </script>
</body>
</html>
